<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="LOTO GAMES POS - Sistema de punto de venta profesional para tienda de videojuegos">
    <meta name="author" content="LOTO GAMES">
    <title>LOTO GAMES POS - Sistema Profesional</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- JsBarcode para códigos de barras -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    
    <!-- Estilos principales -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-gamepad"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-title">LOTO GAMES</span>
                    <span class="logo-subtitle">POS System</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <a href="#" data-module="dashboard" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" data-module="ventas" class="nav-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Punto de Venta</span>
                </a>
                <a href="#" data-module="productos" class="nav-item">
                    <i class="fas fa-boxes"></i>
                    <span>Productos</span>
                </a>
                <a href="#" data-module="inventario" class="nav-item">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Inventario</span>
                </a>
                <a href="#" data-module="servicios" class="nav-item">
                    <i class="fas fa-tools"></i>
                    <span>Servicio Técnico</span>
                </a>
                <a href="#" data-module="clientes" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Clientes</span>
                </a>
                <a href="#" data-module="usuarios" class="nav-item">
                    <i class="fas fa-user-shield"></i>
                    <span>Usuarios</span>
                </a>
                <a href="#" data-module="reportes" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Reportes</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info-sidebar">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <div class="user-name" id="userNameSidebar">Usuario</div>
                        <div class="user-role" id="userRoleSidebar">Rol</div>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="pageTitle">Dashboard</h1>
                    <p id="pageDescription">Visión general del negocio</p>
                </div>
                <div class="top-bar-actions">
                    <div class="date-time">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <div class="notifications">
                        <i class="far fa-bell"></i>
                        <span class="badge" id="notificationBadge">0</span>
                    </div>
                </div>
            </header>
            
            <div id="content" class="content-area">
                <div class="loading">
                    <i class="fas fa-spinner fa-pulse fa-2x"></i>
                    <p>Cargando sistema...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- ============================================ -->
    <!-- SUPABASE - BASE DE DATOS EN LA NUBE          -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    
    <!-- ============================================ -->
    <!-- BASE DE DATOS Y UTILERÍAS                    -->
    <!-- ============================================ -->
    <script src="js/utils/database.js"></script>
    
    <!-- ============================================ -->
    <!-- MÓDULOS DEL SISTEMA (login primero)          -->
    <!-- ============================================ -->
   
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/ventas.js"></script>
    <script src="js/modules/productos.js"></script>
    <script src="js/modules/inventario.js"></script>
    <script src="js/modules/servicios.js"></script>
    <script src="js/modules/clientes.js"></script>
    <script src="js/modules/usuarios.js"></script>
    <script src="js/modules/reportes.js"></script>
    
    <!-- ============================================ -->
    <!-- APLICACIÓN PRINCIPAL                         -->
    <!-- ============================================ -->
    <script src="js/app.js"></script>
    
    <script>
        // Verificación rápida de carga
        console.log("✅ Index.html cargado correctamente");
    </script>
</body>
</html>
